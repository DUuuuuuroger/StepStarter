<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1024" height="1024" fill="#FFFFFF"/>
  
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Blue gradient for staircase -->
    <linearGradient id="stairGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5C6BC0;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Subtle shadow filter -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Staircase with gradient and shadow -->
  <g filter="url(#subtleShadow)">
    <!-- Step 3 (top step) -->
    <rect x="580" y="320" width="320" height="120" rx="16" fill="url(#stairGradient)"/>
    
    <!-- Step 2 -->
    <rect x="340" y="480" width="560" height="120" rx="16" fill="url(#stairGradient)"/>
    
    <!-- Step 1 (bottom step) -->
    <rect x="100" y="640" width="800" height="120" rx="16" fill="url(#stairGradient)"/>
  </g>
  
  <!-- Green Play Button on first step -->
  <g transform="translate(220, 670)">
    <!-- Play button background circle -->
    <circle cx="50" cy="25" r="40" fill="#4CAF50"/>
    
    <!-- Play triangle -->
    <path d="M 40 5 L 40 45 L 70 25 Z" fill="#FFFFFF"/>
  </g>
</svg>